 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Signup</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: auto; font-family: 'Nunito', sans-serif; }

    .scene-bg {
      position: relative;
      min-height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* Floating shapes */
    .float-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
      animation: floatUp 8s ease-in-out infinite;
    }
    .float-shape:nth-child(2) { animation-delay: -2s; animation-duration: 10s; }
    .float-shape:nth-child(3) { animation-delay: -4s; animation-duration: 7s; }
    .float-shape:nth-child(4) { animation-delay: -1s; animation-duration: 9s; }
    .float-shape:nth-child(5) { animation-delay: -3s; animation-duration: 11s; }
    .float-shape:nth-child(6) { animation-delay: -5s; animation-duration: 6s; }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      33% { transform: translateY(-30px) rotate(120deg) scale(1.1); }
      66% { transform: translateY(15px) rotate(240deg) scale(0.9); }
    }

    /* Stars twinkling */
    .star {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* Character */
    .character-container {
      position: relative;
      width: 180px;
      height: 240px;
      transform: translateX(-300px);
      animation: walkIn 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
    }
    @keyframes walkIn {
      0% { transform: translateX(-300px); }
      60% { transform: translateX(10px); }
      80% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    /* Walking animation - legs */
    #leftLeg {
      animation: legWalk 0.6s ease-in-out 0.5s infinite;
      transform-origin: 42px 140px;
    }
    #rightLeg {
      animation: legWalk 0.6s ease-in-out 0.8s infinite;
      transform-origin: 72px 140px;
      animation-direction: reverse;
    }
    @keyframes legWalk {
      0% { transform: rotateZ(0deg); }
      50% { transform: rotateZ(25deg); }
      100% { transform: rotateZ(0deg); }
    }

    /* Walking arms swing */
    #leftArm {
      animation: armWalk 0.6s ease-in-out 0.5s infinite;
      transform-origin: 24px 95px;
    }
    #rightArm {
      animation: armWalk 0.6s ease-in-out 0.8s infinite;
      animation-direction: reverse;
      transform-origin: 106px 95px;
    }
    @keyframes armWalk {
      0% { transform: rotateZ(0deg); }
      50% { transform: rotateZ(-20deg); }
      100% { transform: rotateZ(0deg); }
    }

    /* Body bounce while walking */
    .char-body {
      animation: bodyBounce 0.6s ease-in-out 0.5s infinite;
    }
    @keyframes bodyBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Bag shoulder strap swing */
    .bag-strap {
      animation: strapSwing 0.6s ease-in-out 0.5s infinite;
      transform-origin: 30px 5px;
    }
    @keyframes strapSwing {
      0%, 100% { transform: rotateZ(0deg); }
      50% { transform: rotateZ(-8deg); }
    }

    /* Bag opening animation */
    .bag {
      position: absolute;
      bottom: 45px;
      right: 5px;
      transform-origin: center top;
    }
    .bag.opening {
      animation: bagOpen 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes bagOpen {
      0% { 
        transform: rotateZ(0deg) scale(1) translateY(0);
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
      }
      25% {
        transform: rotateZ(8deg) translateY(-8px) scale(1.02);
      }
      50% {
        transform: rotateZ(20deg) translateY(-25px) scale(1.05);
        filter: drop-shadow(0 8px 20px rgba(167,139,250,0.3));
      }
      75% {
        transform: rotateZ(38deg) translateY(-38px) scale(1.08);
      }
      100% { 
        transform: rotateZ(50deg) translateY(-45px) scale(1.1);
        filter: drop-shadow(0 12px 30px rgba(167,139,250,0.4));
      }
    }

    /* Bag flap opening */
    .bag-flap {
      animation: flapOpen 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      transform-origin: center bottom;
      will-change: transform;
    }
    @keyframes flapOpen {
      0% { transform: rotateX(0deg) rotateZ(0deg); }
      40% { transform: rotateX(-15deg) rotateZ(5deg); }
      75% { transform: rotateX(-50deg) rotateZ(15deg); }
      100% { transform: rotateX(-70deg) rotateZ(20deg); }
    }

    /* Bag glow */
    .bag-glow {
      position: absolute;
      bottom: 20px;
      right: -10px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      opacity: 0;
      animation: bagGlow 1.2s ease-out 3.8s forwards;
      pointer-events: none;
    }
    @keyframes bagGlow {
      0% { opacity: 0; transform: scale(0.3); }
      50% { opacity: 0.8; transform: scale(1.5); }
      100% { opacity: 0; transform: scale(2.5); }
    }

    /* Smile animation */
    .mouth {
      animation: smile 0.5s ease-in-out 2.8s forwards;
    }
    @keyframes smile {
      0% { d: path("M 55 120 Q 65 125 75 120"); }
      100% { d: path("M 50 118 Q 65 135 80 118"); }
    }

    /* Eyes blink */
    .eye {
      animation: blink 3s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 85%, 100% { transform: scaleY(1); }
      88%, 95% { transform: scaleY(0.1); }
    }

    /* Idle waving after walk */
    .wave-arm {
      animation: waveArm 0.6s ease-in-out 4.2s infinite;
      transform-origin: 106px 95px !important;
    }
    @keyframes waveArm {
      0%, 100% { transform: rotateZ(0deg); }
      50% { transform: rotateZ(-35deg); }
    }

    /* Head tilt while waving */
    .head-tilt {
      animation: headTilt 0.6s ease-in-out 4.2s infinite;
      transform-origin: 65px 60px;
    }
    @keyframes headTilt {
      0%, 100% { transform: rotateZ(0deg); }
      50% { transform: rotateZ(8deg); }
    }

    /* Form reveal */
    .form-wrapper {
      opacity: 0;
      transform: translateY(60px) scale(0.8);
      animation: formReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 4.2s forwards;
    }
    @keyframes formReveal {
      0% { opacity: 0; transform: translateY(60px) scale(0.8); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Sparkle particles from bag */
    .sparkle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      opacity: 0;
      animation: sparkleUp 1.5s ease-out forwards;
    }
    @keyframes sparkleUp {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }

    /* Input floating labels */
    .input-group { position: relative; margin-bottom: 1.25rem; }
    .input-group input {
      width: 100%;
      padding: 14px 44px 14px 16px;
      border: 2px solid #e2d5f3;
      border-radius: 14px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      outline: none;
      color: #4a3470;
    }
    .input-group input:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 4px rgba(167,139,250,0.15), 0 4px 12px rgba(167,139,250,0.1);
      background: rgba(255,255,255,0.95);
    }
    .input-group label {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: #9b8bb8;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      font-weight: 600;
      background: transparent;
      padding: 0 4px;
    }
    .input-group input:focus ~ label,
    .input-group input:not(:placeholder-shown) ~ label {
      top: -1px;
      font-size: 11px;
      color: #7c3aed;
      font-weight: 700;
      background: linear-gradient(to bottom, transparent 45%, white 45%);
      border-radius: 4px;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #b8a5d4;
      transition: color 0.2s;
      background: none;
      border: none;
      padding: 4px;
    }
    .toggle-pw:hover { color: #7c3aed; }

    .error-text {
      font-size: 12px;
      color: #ef4444;
      margin-top: 4px;
      padding-left: 8px;
      font-weight: 600;
      display: none;
    }
    .error-text.show { display: block; animation: shakeIn 0.3s ease; }

    @keyframes shakeIn {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .submit-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 25px rgba(124,58,237,0.35);
    }
    .submit-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success animation */
    .success-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    .success-overlay.show {
      opacity: 1;
      pointer-events: auto;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .checkmark-circle {
      width: 70px; height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    /* Confetti */
    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiFall 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--cx), var(--cy)) rotate(var(--cr)); }
    }

    /* Thumbs up reaction */
    .reaction {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      font-size: 32px;
      z-index: 20;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .reaction.show { transform: translateX(-50%) scale(1); }

    /* Sad reaction */
    .sad-shake {
      animation: sadShake 0.5s ease-in-out;
    }
    @keyframes sadShake {
      0%, 100% { transform: translateX(0) rotate(0); }
      20% { transform: translateX(-8px) rotate(-3deg); }
      40% { transform: translateX(8px) rotate(3deg); }
      60% { transform: translateX(-5px) rotate(-2deg); }
      80% { transform: translateX(5px) rotate(2deg); }
    }

    /* Glass card */
    .glass-card {
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.4);
    }

    /* Login link */
    .login-link {
      text-decoration: none;
      font-weight: 700;
      transition: all 0.2s;
    }
    .login-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .character-container {
        width: 130px;
        height: 180px;
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>

         Passwords do not match
        </div>
       </div><!-- Submit button --> <button type="submit" class="submit-btn text-white" id="submitBtn" style="background: linear-gradient(135deg, #7c3aed, #a78bfa);"> <span id="btnText">Sign Up</span> <span id="btnSpinner" style="display:none;" class="spinner"></span> </button>
      </form><!-- Login link -->
      <p id="loginText" class="text-center mt-4" style="font-size: 13px; color: #9b8bb8; font-weight: 600;">Already have an account? <a href="#" class="login-link" style="color: #7c3aed;" onclick="event.preventDefault();">Log in</a></p>
     </div>
    </div>
   </div>
  </div>
  <script>
    // ======= Element SDK Setup =======
    const defaultConfig = {
      background_color: '#ede9fe',
      surface_color: '#ffffff',
      text_color: '#4a2d7a',
      primary_action_color: '#7c3aed',
      secondary_action_color: '#9b8bb8',
      font_family: 'Nunito',
      font_size: 15,
      page_title: 'Join the Adventure!',
      subtitle_text: 'Create your account',
      button_text: 'Sign Up',
      login_link_text: 'Already have an account? Log in'
    };

    function applyConfig(config) {
      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
      const font = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;

      // Background
      const sceneBg = document.getElementById('sceneBg');
      if (sceneBg) sceneBg.style.background = `linear-gradient(135deg, ${bg} 0%, ${lighten(bg, 0.95)} 30%, ${lighten(bg, 0.9)} 60%, ${bg} 100%)`;

      // Surface (form card)
      const formCard = document.getElementById('formCard');
      if (formCard) formCard.style.background = hexToRgba(surface, 0.75);

      // Text colors
      const title = document.getElementById('formTitle');
      if (title) {
        title.textContent = config.page_title || defaultConfig.page_title;
        title.style.color = text;
        title.style.fontFamily = `${font}, Nunito, sans-serif`;
        title.style.fontSize = `${fontSize * 1.6}px`;
      }

      const subtitle = document.getElementById('formSubtitle');
      if (subtitle) {
        subtitle.textContent = config.subtitle_text || defaultConfig.subtitle_text;
        subtitle.style.color = secondary;
        subtitle.style.fontFamily = `${font}, Nunito, sans-serif`;
        subtitle.style.fontSize = `${fontSize * 0.93}px`;
      }

      // Button
      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn) {
        submitBtn.style.background = `linear-gradient(135deg, ${primary}, ${lighten(primary, 0.8)})`;
        submitBtn.style.fontFamily = `${font}, Nunito, sans-serif`;
        submitBtn.style.fontSize = `${fontSize * 1.07}px`;
      }
      const btnText = document.getElementById('btnText');
      if (btnText) btnText.textContent = config.button_text || defaultConfig.button_text;

      // Login link
      const loginText = document.getElementById('loginText');
      if (loginText) {
        loginText.style.color = secondary;
        loginText.style.fontFamily = `${font}, Nunito, sans-serif`;
        loginText.style.fontSize = `${fontSize * 0.87}px`;
        // Parse login text for link
        const linkText = config.login_link_text || defaultConfig.login_link_text;
        const linkEl = loginText.querySelector('a');
        if (linkEl) {
          linkEl.style.color = primary;
          // Split on the link text portion
          const parts = linkText.split(/Log in|Sign in|Login/i);
          const linkWord = linkText.match(/Log in|Sign in|Login/i);
          if (parts.length > 1 && linkWord) {
            loginText.innerHTML = `${parts[0]}<a href="#" class="login-link" style="color:${primary};" onclick="event.preventDefault();">${linkWord[0]}</a>${parts[1] || ''}`;
          } else {
            loginText.textContent = linkText;
          }
        }
      }

      // Inputs
      document.querySelectorAll('.input-group input').forEach(input => {
        input.style.fontFamily = `${font}, Nunito, sans-serif`;
        input.style.fontSize = `${fontSize}px`;
        input.style.color = text;
        input.style.borderColor = lighten(primary, 0.85);
      });
      document.querySelectorAll('.input-group label').forEach(label => {
        label.style.fontFamily = `${font}, Nunito, sans-serif`;
        label.style.fontSize = `${fontSize}px`;
      });

      // Success text
      const successText = document.getElementById('successText');
      if (successText) {
        successText.style.color = text;
        successText.style.fontFamily = `${font}, Nunito, sans-serif`;
      }
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function lighten(hex, factor) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      const lr = Math.round(r + (255 - r) * factor);
      const lg = Math.round(g + (255 - g) * factor);
      const lb = Math.round(b + (255 - b) * factor);
      return `#${lr.toString(16).padStart(2,'0')}${lg.toString(16).padStart(2,'0')}${lb.toString(16).padStart(2,'0')}`;
    }

    // Initialize Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => { applyConfig(config); },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
          { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['page_title', config.page_title || defaultConfig.page_title],
        ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text],
        ['button_text', config.button_text || defaultConfig.button_text],
        ['login_link_text', config.login_link_text || defaultConfig.login_link_text]
      ])
    });

    // ======= Sparkle particles =======
    setTimeout(() => {
      // Stop walking animations
      const leftLeg = document.getElementById('leftLeg');
      const rightLeg = document.getElementById('rightLeg');
      const leftArm = document.getElementById('leftArm');
      if (leftLeg) leftLeg.style.animation = 'none';
      if (rightLeg) rightLeg.style.animation = 'none';
      if (leftArm) leftArm.style.animation = 'none';
      // rightArm will now wave (animation already in CSS)

      // Open the bag
      const bag = document.getElementById('schoolBag');
      if (bag) bag.classList.add('opening');

      // Sparkles burst from bag
      const container = document.getElementById('sparkleContainer');
      if (!container) return;
      const colors = ['#a78bfa', '#f9a8d4', '#fbbf24', '#60a5fa', '#c084fc'];
      for (let i = 0; i < 12; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        const tx = (Math.random() - 0.5) * 120;
        const ty = -(Math.random() * 80 + 40);
        s.style.cssText = `--tx:${tx}px;--ty:${ty}px;background:${colors[i % colors.length]};right:${10 + Math.random()*30}px;bottom:${30 + Math.random()*20}px;animation-delay:${Math.random()*0.5}s;`;
        container.appendChild(s);
      }
    }, 3800);

    // ======= Toggle password =======
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      const icon = btn.querySelector('i');
      if (icon) {
        icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
        lucide.createIcons();
      }
    }

    // ======= Form validation =======
    const form = document.getElementById('signupForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('fullName');
      const email = document.getElementById('email');
      const pw = document.getElementById('password');
      const confirmPw = document.getElementById('confirmPw');
      let valid = true;

      // Clear errors
      document.querySelectorAll('.error-text').forEach(el => el.classList.remove('show'));

      // Validate name
      if (!name.value.trim()) {
        document.getElementById('nameError').classList.add('show');
        valid = false;
      }

      // Validate email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email.value)) {
        document.getElementById('emailError').classList.add('show');
        valid = false;
      }

      // Validate password
      if (pw.value.length < 8) {
        document.getElementById('pwError').classList.add('show');
        valid = false;
      }

      // Validate confirm password
      if (pw.value !== confirmPw.value || !confirmPw.value) {
        document.getElementById('confirmError').classList.add('show');
        valid = false;
      }

      if (!valid) {
        // Sad reaction
        const reaction = document.getElementById('reaction');
        reaction.textContent = '😢';
        reaction.classList.add('show');
        const charContainer = document.querySelector('.char-body');
        charContainer.classList.add('sad-shake');
        setTimeout(() => {
          reaction.classList.remove('show');
          charContainer.classList.remove('sad-shake');
        }, 1500);
        return;
      }

      // Loading state
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');
      btn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'inline-block';

      // Simulate submission
      await new Promise(r => setTimeout(r, 1800));

      btnSpinner.style.display = 'none';
      btnText.style.display = 'inline';
      btn.disabled = false;

      // Success!
      // Thumbs up
      const reaction = document.getElementById('reaction');
      reaction.textContent = '👍';
      reaction.classList.add('show');

      // Show success overlay
      const overlay = document.getElementById('successOverlay');
      overlay.classList.add('show');

      // Confetti
      const confContainer = document.getElementById('confettiContainer');
      confContainer.innerHTML = '';
      const confColors = ['#7c3aed', '#f472b6', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa'];
      for (let i = 0; i < 30; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        const cx = (Math.random() - 0.5) * 300;
        const cy = (Math.random() - 0.5) * 300;
        const cr = Math.random() * 720 - 360;
        c.style.cssText = `--cx:${cx}px;--cy:${cy}px;--cr:${cr}deg;background:${confColors[i % confColors.length]};left:50%;top:50%;animation-delay:${Math.random()*0.3}s;`;
        confContainer.appendChild(c);
      }

      // Reset after a while
      setTimeout(() => {
        overlay.classList.remove('show');
        reaction.classList.remove('show');
        form.reset();
        confContainer.innerHTML = '';
      }, 4000);
    });

    // Focus ripple effect on inputs
    document.querySelectorAll('.input-group input').forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.style.transform = 'scale(1.01)';
        input.parentElement.style.transition = 'transform 0.2s ease';
      });
      input.addEventListener('blur', () => {
        input.parentElement.style.transform = 'scale(1)';
      });
    });

    // Init Lucide icons
    lucide.createIcons();
  </script>
